<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Facet — Metal Surface Finishing Services</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts it into a query string
      // so that the single page app can route accordingly.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') + (q.q ? ('?' + q.q) : '') + l.hash
            );
          }
        } else {
          // If no query string, redirect to index with path encoded
          var path = l.pathname + l.search;
          l.href = l.protocol + '//' + l.host + '/?/' + path.replace(/&/g, '~and~') + (l.hash || '');
        }
      }(window.location))
    </script>
  </head>
  <body>
  </body>
</html>
